services:
  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    ports:
      - "3000:5000"
    depends_on:
      - ml-service
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  ml-service:
    build:
      context: ../ml-service
    networks:
      - internal
    expose:
      - "8000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

networks:
  internal:
    driver: bridge